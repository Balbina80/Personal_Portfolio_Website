<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | BJ Design</title>
  <meta name="description" content="Thank you for your message.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <main>
    <section class="contact section" id="thank-you" style="min-height: 100vh; display: flex; align-items: center;">
      <div class="container contact-box" style="text-align: center;">
        <div class="contact-text" style="max-width: 100%; margin: 0 auto;">
          <p class="section-tag">BJ Design</p>

          <h2>Thank you / Dziękuję</h2>

          <p>
            Your message has been sent successfully.<br>
            Twoja wiadomość została pomyślnie wysłana.
          </p>

          <p class="contact-note">
            I'll get back to you within 24 hours.<br>
            Odpowiem w ciągu 24 godzin.
          </p>

          <div style="margin-top: 2rem;">
            <a href="/" class="btn btn-primary">Back to homepage</a>
          </div>
        </div>
      </div>
    </section>
  </main>

</body>
</html>
